<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-family="Times New Roman" font-size="14" font-weight="bold" text-anchor="middle">Fig. 1. LanguaBot System Architecture</text>
  
  <!-- User Layer -->
  <rect x="50" y="60" width="700" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="85" font-family="Times New Roman" font-size="12" font-weight="bold" text-anchor="middle">User Interface Layer</text>
  <rect x="100" y="95" width="150" height="35" fill="#e8e8e8" stroke="black" stroke-width="1"/>
  <text x="175" y="115" font-family="Times New Roman" font-size="10" text-anchor="middle">Topic Practice</text>
  <rect x="280" y="95" width="150" height="35" fill="#e8e8e8" stroke="black" stroke-width="1"/>
  <text x="355" y="115" font-family="Times New Roman" font-size="10" text-anchor="middle">Grammar Practice</text>
  <rect x="460" y="95" width="150" height="35" fill="#e8e8e8" stroke="black" stroke-width="1"/>
  <text x="535" y="115" font-family="Times New Roman" font-size="10" text-anchor="middle">Interview Prep</text>
  <rect x="640" y="95" width="80" height="35" fill="#e8e8e8" stroke="black" stroke-width="1"/>
  <text x="680" y="115" font-family="Times New Roman" font-size="10" text-anchor="middle">Dashboard</text>
  
  <!-- Frontend Layer -->
  <rect x="50" y="170" width="700" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="195" font-family="Times New Roman" font-size="12" font-weight="bold" text-anchor="middle">Frontend Layer (React 18)</text>
  
  <!-- Speech Recognition Components -->
  <rect x="80" y="210" width="180" height="65" fill="#d0e8ff" stroke="black" stroke-width="1"/>
  <text x="170" y="230" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Hybrid Speech Recognition</text>
  <line x1="100" y1="240" x2="240" y2="240" stroke="black" stroke-width="1"/>
  <text x="120" y="255" font-family="Times New Roman" font-size="9" text-anchor="middle">Browser STT</text>
  <text x="200" y="255" font-family="Times New Roman" font-size="9" text-anchor="middle">Whisper AI</text>
  <text x="170" y="270" font-family="Times New Roman" font-size="9" text-anchor="middle">(Web Worker)</text>
  
  <!-- React Components -->
  <rect x="300" y="210" width="150" height="65" fill="#d0e8ff" stroke="black" stroke-width="1"/>
  <text x="375" y="230" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">React Components</text>
  <text x="375" y="245" font-family="Times New Roman" font-size="9" text-anchor="middle">PracticeSession</text>
  <text x="375" y="260" font-family="Times New Roman" font-size="9" text-anchor="middle">WhisperContext</text>
  <text x="375" y="275" font-family="Times New Roman" font-size="9" text-anchor="middle">Dashboard</text>
  
  <!-- Feedback System -->
  <rect x="490" y="210" width="150" height="65" fill="#d0e8ff" stroke="black" stroke-width="1"/>
  <text x="565" y="230" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Real-Time Feedback</text>
  <text x="565" y="245" font-family="Times New Roman" font-size="9" text-anchor="middle">Filler Word Detection</text>
  <text x="565" y="260" font-family="Times New Roman" font-size="9" text-anchor="middle">Repetition Analysis</text>
  <text x="565" y="275" font-family="Times New Roman" font-size="9" text-anchor="middle">Fluency Metrics</text>
  
  <!-- Arrows from User to Frontend -->
  <line x1="175" y1="140" x2="175" y2="210" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="355" y1="140" x2="355" y2="210" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="535" y1="140" x2="535" y2="210" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="680" y1="140" x2="680" y2="210" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Backend Layer -->
  <rect x="50" y="320" width="700" height="100" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="345" font-family="Times New Roman" font-size="12" font-weight="bold" text-anchor="middle">Backend Layer (Node.js/Express)</text>
  
  <rect x="80" y="360" width="150" height="45" fill="#ffe8d0" stroke="black" stroke-width="1"/>
  <text x="155" y="380" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Authentication</text>
  <text x="155" y="395" font-family="Times New Roman" font-size="9" text-anchor="middle">JWT + OAuth</text>
  
  <rect x="260" y="360" width="150" height="45" fill="#ffe8d0" stroke="black" stroke-width="1"/>
  <text x="335" y="380" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Session Management</text>
  <text x="335" y="395" font-family="Times New Roman" font-size="9" text-anchor="middle">RESTful API</text>
  
  <rect x="440" y="360" width="150" height="45" fill="#ffe8d0" stroke="black" stroke-width="1"/>
  <text x="515" y="380" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">AI Integration</text>
  <text x="515" y="395" font-family="Times New Roman" font-size="9" text-anchor="middle">Groq API (LLM)</text>
  
  <rect x="620" y="360" width="100" height="45" fill="#ffe8d0" stroke="black" stroke-width="1"/>
  <text x="670" y="380" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Data Storage</text>
  <text x="670" y="395" font-family="Times New Roman" font-size="9" text-anchor="middle">JSON Files</text>
  
  <!-- Arrows from Frontend to Backend -->
  <line x1="170" y1="275" x2="155" y2="360" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="275" x2="335" y2="360" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="565" y1="275" x2="515" y2="360" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Database Layer -->
  <rect x="50" y="450" width="700" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="475" font-family="Times New Roman" font-size="12" font-weight="bold" text-anchor="middle">Database Layer</text>
  
  <rect x="250" y="490" width="300" height="15" fill="#d0ffd0" stroke="black" stroke-width="1"/>
  <text x="400" y="502" font-family="Times New Roman" font-size="10" text-anchor="middle">MongoDB - User Sessions, Progress Tracking, Analytics</text>
  
  <!-- External Services -->
  <rect x="550" y="540" width="200" height="50" fill="#fff0d0" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="650" y="560" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">External Services</text>
  <text x="650" y="575" font-family="Times New Roman" font-size="9" text-anchor="middle">Groq API</text>
  <text x="650" y="588" font-family="Times New Roman" font-size="9" text-anchor="middle">(Llama-3.3-70b)</text>
  
  <!-- Arrow from Backend to Database -->
  <line x1="400" y1="405" x2="400" y2="490" stroke="black" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from Backend to External -->
  <line x1="515" y1="405" x2="650" y2="540" stroke="black" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
  </defs>
</svg>

