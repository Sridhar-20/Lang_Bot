<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-family="Times New Roman" font-size="14" font-weight="bold" text-anchor="middle">Fig. 3. Component Interaction Diagram</text>
  
  <!-- User -->
  <circle cx="100" cy="100" r="30" fill="#e8e8e8" stroke="black" stroke-width="2"/>
  <text x="100" y="107" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">User</text>
  
  <!-- PracticeSession Component -->
  <rect x="200" y="70" width="140" height="60" fill="#d0e8ff" stroke="black" stroke-width="2"/>
  <text x="270" y="90" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">PracticeSession</text>
  <text x="270" y="105" font-family="Times New Roman" font-size="8" text-anchor="middle">Audio Capture</text>
  <text x="270" y="118" font-family="Times New Roman" font-size="8" text-anchor="middle">UI Management</text>
  
  <!-- BrowserSTT Service -->
  <rect x="380" y="70" width="120" height="60" fill="#d0ffd0" stroke="black" stroke-width="2"/>
  <text x="440" y="90" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">BrowserSTT</text>
  <text x="440" y="105" font-family="Times New Roman" font-size="8" text-anchor="middle">Service</text>
  <text x="440" y="118" font-family="Times New Roman" font-size="8" text-anchor="middle">Web Speech API</text>
  
  <!-- WhisperContext -->
  <rect x="200" y="170" width="140" height="60" fill="#ffd0d0" stroke="black" stroke-width="2"/>
  <text x="270" y="190" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">WhisperContext</text>
  <text x="270" y="205" font-family="Times New Roman" font-size="8" text-anchor="middle">Model Manager</text>
  <text x="270" y="218" font-family="Times New Roman" font-size="8" text-anchor="middle">State Management</text>
  
  <!-- Whisper Worker -->
  <rect x="380" y="170" width="120" height="60" fill="#ffd0d0" stroke="black" stroke-width="2"/>
  <text x="440" y="190" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Whisper</text>
  <text x="440" y="205" font-family="Times New Roman" font-size="8" text-anchor="middle">Web Worker</text>
  <text x="440" y="218" font-family="Times New Roman" font-size="8" text-anchor="middle">Transformers.js</text>
  
  <!-- Feedback Analyzer -->
  <rect x="200" y="270" width="140" height="60" fill="#fff0d0" stroke="black" stroke-width="2"/>
  <text x="270" y="290" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Feedback</text>
  <text x="270" y="305" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Analyzer</text>
  <text x="270" y="318" font-family="Times New Roman" font-size="8" text-anchor="middle">Filler Words</text>
  <text x="270" y="330" font-family="Times New Roman" font-size="8" text-anchor="middle">Repetition</text>
  
  <!-- Backend API -->
  <rect x="550" y="120" width="120" height="80" fill="#ffe8d0" stroke="black" stroke-width="2"/>
  <text x="610" y="140" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Backend API</text>
  <text x="610" y="155" font-family="Times New Roman" font-size="8" text-anchor="middle">Express.js</text>
  <text x="610" y="170" font-family="Times New Roman" font-size="8" text-anchor="middle">Session</text>
  <text x="610" y="183" font-family="Times New Roman" font-size="8" text-anchor="middle">Management</text>
  <text x="610" y="196" font-family="Times New Roman" font-size="8" text-anchor="middle">AI Analysis</text>
  
  <!-- Groq API -->
  <rect x="550" y="240" width="120" height="50" fill="#fff0d0" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="610" y="260" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Groq API</text>
  <text x="610" y="275" font-family="Times New Roman" font-size="8" text-anchor="middle">LLM Service</text>
  <text x="610" y="288" font-family="Times New Roman" font-size="8" text-anchor="middle">Feedback Gen</text>
  
  <!-- MongoDB -->
  <rect x="550" y="330" width="120" height="50" fill="#d0ffd0" stroke="black" stroke-width="2"/>
  <text x="610" y="350" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">MongoDB</text>
  <text x="610" y="365" font-family="Times New Roman" font-size="8" text-anchor="middle">Session Storage</text>
  <text x="610" y="378" font-family="Times New Roman" font-size="8" text-anchor="middle">Progress Data</text>
  
  <!-- Arrows -->
  <!-- User to PracticeSession -->
  <line x1="130" y1="100" x2="200" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="165" y="95" font-family="Times New Roman" font-size="8" text-anchor="middle">1. Start</text>
  
  <!-- PracticeSession to BrowserSTT -->
  <line x1="340" y1="100" x2="380" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="95" font-family="Times New Roman" font-size="8" text-anchor="middle">2. Audio</text>
  
  <!-- BrowserSTT back to PracticeSession -->
  <line x1="380" y1="130" x2="340" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="135" font-family="Times New Roman" font-size="8" text-anchor="middle">3. Transcript</text>
  
  <!-- PracticeSession to WhisperContext -->
  <line x1="270" y1="130" x2="270" y2="170" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="280" y="150" font-family="Times New Roman" font-size="8" text-anchor="middle">4. Request</text>
  
  <!-- WhisperContext to Worker -->
  <line x1="340" y1="200" x2="380" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="195" font-family="Times New Roman" font-size="8" text-anchor="middle">5. Process</text>
  
  <!-- Worker back to WhisperContext -->
  <line x1="380" y1="230" x2="340" y2="230" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="235" font-family="Times New Roman" font-size="8" text-anchor="middle">6. Result</text>
  
  <!-- WhisperContext to PracticeSession -->
  <line x1="270" y1="230" x2="270" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="280" y="250" font-family="Times New Roman" font-size="8" text-anchor="middle">7. Update</text>
  
  <!-- PracticeSession to Feedback Analyzer -->
  <line x1="200" y1="130" x2="200" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="190" y="200" font-family="Times New Roman" font-size="8" text-anchor="middle">8. Analyze</text>
  
  <!-- Feedback Analyzer to PracticeSession -->
  <line x1="200" y1="330" x2="200" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="185" y="230" font-family="Times New Roman" font-size="8" text-anchor="middle">9. Feedback</text>
  
  <!-- PracticeSession to Backend -->
  <line x1="340" y1="100" x2="550" y2="140" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="445" y="115" font-family="Times New Roman" font-size="8" text-anchor="middle">10. Submit</text>
  
  <!-- Backend to Groq -->
  <line x1="610" y1="200" x2="610" y2="240" stroke="black" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="625" y="220" font-family="Times New Roman" font-size="8" text-anchor="middle">11. AI</text>
  
  <!-- Groq back to Backend -->
  <line x1="610" y1="290" x2="610" y2="200" stroke="black" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="625" y="245" font-family="Times New Roman" font-size="8" text-anchor="middle">12. Analysis</text>
  
  <!-- Backend to MongoDB -->
  <line x1="610" y1="200" x2="610" y2="330" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="625" y="265" font-family="Times New Roman" font-size="8" text-anchor="middle">13. Store</text>
  
  <!-- Backend to PracticeSession -->
  <line x1="550" y1="160" x2="340" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="445" y="125" font-family="Times New Roman" font-size="8" text-anchor="middle">14. Results</text>
  
  <!-- PracticeSession to User -->
  <line x1="200" y1="100" x2="130" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="165" y="105" font-family="Times New Roman" font-size="8" text-anchor="middle">15. Display</text>
  
  <!-- Legend -->
  <rect x="50" y="420" width="700" height="150" fill="none" stroke="black" stroke-width="1"/>
  <text x="400" y="440" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Interaction Flow</text>
  
  <text x="100" y="465" font-family="Times New Roman" font-size="9" text-anchor="middle">1-3: Real-time Browser STT</text>
  <text x="100" y="480" font-family="Times New Roman" font-size="9" text-anchor="middle">4-7: Whisper Processing</text>
  <text x="100" y="495" font-family="Times New Roman" font-size="9" text-anchor="middle">8-9: Client-side Feedback</text>
  
  <text x="400" y="465" font-family="Times New Roman" font-size="9" text-anchor="middle">10-12: Server-side AI Analysis</text>
  <text x="400" y="480" font-family="Times New Roman" font-size="9" text-anchor="middle">13: Data Persistence</text>
  <text x="400" y="495" font-family="Times New Roman" font-size="9" text-anchor="middle">14-15: Results Display</text>
  
  <text x="650" y="465" font-family="Times New Roman" font-size="9" text-anchor="middle">Solid: Synchronous</text>
  <text x="650" y="480" font-family="Times New Roman" font-size="9" text-anchor="middle">Dashed: Async/External</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
  </defs>
</svg>

