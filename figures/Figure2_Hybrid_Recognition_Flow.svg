<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-family="Times New Roman" font-size="14" font-weight="bold" text-anchor="middle">Fig. 2. Hybrid Speech Recognition Flow</text>
  
  <!-- Start -->
  <ellipse cx="400" cy="70" rx="60" ry="25" fill="#d0e8ff" stroke="black" stroke-width="2"/>
  <text x="400" y="77" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">User Speech</text>
  
  <!-- Audio Capture -->
  <rect x="320" y="120" width="160" height="50" fill="#e8e8e8" stroke="black" stroke-width="2"/>
  <text x="400" y="140" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Audio Capture</text>
  <text x="400" y="155" font-family="Times New Roman" font-size="9" text-anchor="middle">MediaRecorder API</text>
  <text x="400" y="168" font-family="Times New Roman" font-size="9" text-anchor="middle">16kHz Sample Rate</text>
  
  <!-- Split into two paths -->
  <line x1="400" y1="170" x2="400" y2="200" stroke="black" stroke-width="2"/>
  <line x1="250" y1="200" x2="550" y2="200" stroke="black" stroke-width="2"/>
  
  <!-- Phase 1: Browser STT -->
  <rect x="150" y="220" width="200" height="80" fill="#d0ffd0" stroke="black" stroke-width="2"/>
  <text x="250" y="240" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Phase 1: Real-Time</text>
  <text x="250" y="255" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Browser STT</text>
  <line x1="170" y1="265" x2="330" y2="265" stroke="black" stroke-width="1"/>
  <text x="250" y="278" font-family="Times New Roman" font-size="8" text-anchor="middle">Web Speech API</text>
  <text x="250" y="292" font-family="Times New Roman" font-size="8" text-anchor="middle">Instant Display</text>
  
  <!-- Phase 2: Whisper -->
  <rect x="450" y="220" width="200" height="80" fill="#ffd0d0" stroke="black" stroke-width="2"/>
  <text x="550" y="240" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Phase 2: Enhanced</text>
  <text x="550" y="255" font-family="Times New Roman" font-size="9" font-weight="bold" text-anchor="middle">Whisper AI</text>
  <line x1="470" y1="265" x2="630" y2="265" stroke="black" stroke-width="1"/>
  <text x="550" y="278" font-family="Times New Roman" font-size="8" text-anchor="middle">Transformers.js</text>
  <text x="550" y="292" font-family="Times New Roman" font-size="8" text-anchor="middle">Web Worker</text>
  
  <!-- Arrows from split -->
  <line x1="250" y1="200" x2="250" y2="220" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="200" x2="550" y2="220" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Processing indicators -->
  <text x="250" y="330" font-family="Times New Roman" font-size="9" font-style="italic" text-anchor="middle">Latency: &lt;100ms</text>
  <text x="250" y="345" font-family="Times New Roman" font-size="9" font-style="italic" text-anchor="middle">Accuracy: ~78%</text>
  
  <text x="550" y="330" font-family="Times New Roman" font-size="9" font-style="italic" text-anchor="middle">Latency: ~1.2s</text>
  <text x="550" y="345" font-family="Times New Roman" font-size="9" font-style="italic" text-anchor="middle">Accuracy: ~94%</text>
  
  <!-- Merge point -->
  <line x1="250" y1="300" x2="250" y2="380" stroke="black" stroke-width="2"/>
  <line x1="550" y1="300" x2="550" y2="380" stroke="black" stroke-width="2"/>
  <line x1="250" y1="380" x2="550" y2="380" stroke="black" stroke-width="2"/>
  
  <!-- Transcript Selection -->
  <rect x="300" y="390" width="200" height="50" fill="#fff0d0" stroke="black" stroke-width="2"/>
  <text x="400" y="410" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Transcript Selection</text>
  <text x="400" y="425" font-family="Times New Roman" font-size="9" text-anchor="middle">Prefer Whisper if available</text>
  <text x="400" y="438" font-family="Times New Roman" font-size="9" text-anchor="middle">Fallback to Browser STT</text>
  
  <!-- Final output -->
  <rect x="320" y="460" width="160" height="30" fill="#e8e8e8" stroke="black" stroke-width="2"/>
  <text x="400" y="480" font-family="Times New Roman" font-size="10" font-weight="bold" text-anchor="middle">Final Transcript</text>
  
  <!-- Arrows -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="440" x2="400" y2="460" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
  </defs>
  
  <!-- Parallel processing indicator -->
  <text x="400" y="365" font-family="Times New Roman" font-size="9" font-style="italic" text-anchor="middle">Parallel Processing</text>
</svg>

